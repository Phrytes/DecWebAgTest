<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Display Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #0f1117;
      font-family: system-ui, sans-serif;
      transition: background 1s ease;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    /* Message overlay */
    #message-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 10;
    }
    #message-text {
      font-size: clamp(32px, 6vw, 80px);
      font-weight: 800;
      letter-spacing: -1px;
      text-align: center;
      padding: 20px 40px;
      opacity: 0;
      transform: scale(0.8);
      transition: opacity .3s ease, transform .3s ease;
      text-shadow: 0 0 40px currentColor;
      max-width: 90vw;
      word-break: break-word;
    }
    #message-text.visible {
      opacity: 1;
      transform: scale(1);
    }

    /* Flash layer */
    #flash {
      position: fixed;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      z-index: 20;
      transition: opacity .05s;
    }

    /* Status pill */
    #status-pill {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transition: opacity .5s;
    }
    #status-pill.hide { opacity: 0; pointer-events: none; }

    .pill {
      background: rgba(0,0,0,.65);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 40px;
      padding: 8px 16px;
      font-size: 12px;
      color: rgba(255,255,255,.7);
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: border-color .2s;
    }
    .pill:hover { border-color: rgba(255,255,255,.4); }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #f59e0b;
    }
    .dot.connected { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    #address-text {
      font-family: monospace;
      font-size: 11px;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .scene-label {
      background: rgba(0,0,0,.4);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px;
      color: rgba(255,255,255,.4);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>
<div id="flash"></div>

<div id="message-overlay">
  <div id="message-text">Hello!</div>
</div>

<div id="status-pill">
  <div class="pill" onclick="copyAddress()" title="Click to copy address">
    <div class="dot" id="dot"></div>
    <span id="address-text">Connecting to NKN…</span>
  </div>
  <div class="scene-label" id="scene-label">none</div>
</div>

<script src="https://unpkg.com/nkn-sdk/dist/nkn.js"></script>
<script>
// ─────────────────────────────────────────────────────────────────────────────
// Canvas engine
// ─────────────────────────────────────────────────────────────────────────────

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  initScene();
}
window.addEventListener('resize', resize);

// ── State ──────────────────────────────────────────────────────────────────

let state = {
  scene:     'particles',
  bgColor:   '#0f1117',
  accent:    '#6c63ff',
  speed:     1,
  intensity: 1,
};

// ── Scene objects ──────────────────────────────────────────────────────────

let particles   = [];
let matrix      = { cols: [], chars: '0123456789ABCDEFアイウエオカキクケコサシスセソタチツテトナニヌネノ'.split('') };
let auroraBlobs = [];
let shapes      = [];
let fireworks   = [];
let bubbles     = [];
let waveT       = 0;

function initScene() {
  particles   = [];
  matrix.cols = [];
  auroraBlobs = [];
  shapes      = [];
  fireworks   = [];
  bubbles     = [];

  if (state.scene === 'particles') {
    for (let i = 0; i < 120; i++) particles.push(mkParticle());
  }
  if (state.scene === 'matrix') {
    const cols = Math.floor(W / 18);
    for (let i = 0; i < cols; i++) {
      matrix.cols.push({ x: i * 18 + 9, y: Math.random() * -H, speed: 1 + Math.random() * 2 });
    }
  }
  if (state.scene === 'aurora') {
    for (let i = 0; i < 5; i++) auroraBlobs.push(mkAuroraBlob(i));
  }
  if (state.scene === 'geometric') {
    for (let i = 0; i < 8; i++) shapes.push(mkShape(i));
  }
  if (state.scene === 'bubbles') {
    for (let i = 0; i < 40; i++) bubbles.push(mkBubble());
  }
}

function mkParticle() {
  return {
    x: Math.random() * W,
    y: Math.random() * H,
    r: 1.5 + Math.random() * 4,
    vx: (Math.random() - .5) * .8,
    vy: (Math.random() - .5) * .8,
    hue: Math.random() * 360,
    alpha: .4 + Math.random() * .6,
  };
}

function mkAuroraBlob(i) {
  const colors = ['#6c63ff','#00d4aa','#f59e0b','#ec4899','#22c55e'];
  return {
    x: (W / 4) * i + W / 8,
    y: H * .3 + Math.random() * H * .3,
    rx: 200 + Math.random() * 300,
    ry: 100 + Math.random() * 150,
    color: colors[i % colors.length],
    vx: (.3 + Math.random() * .4) * (Math.random() > .5 ? 1 : -1),
    vy: (.1 + Math.random() * .2) * (Math.random() > .5 ? 1 : -1),
    rot: 0,
    rotSpeed: (.002 + Math.random() * .003) * (Math.random() > .5 ? 1 : -1),
  };
}

function mkShape(i) {
  const sides = [3, 4, 5, 6, 8][Math.floor(Math.random() * 5)];
  return {
    x: Math.random() * W,
    y: Math.random() * H,
    r: 30 + Math.random() * 80,
    sides,
    rot: Math.random() * Math.PI * 2,
    rotSpeed: (.003 + Math.random() * .008) * (Math.random() > .5 ? 1 : -1),
    hue: Math.random() * 360,
    alpha: .12 + Math.random() * .2,
    stroke: Math.random() > .5,
  };
}

function mkBubble() {
  return {
    x: Math.random() * W,
    y: H + Math.random() * 100,
    r: 10 + Math.random() * 40,
    speed: .5 + Math.random() * 1.5,
    wobble: Math.random() * Math.PI * 2,
    hue: Math.random() * 360,
  };
}

function spawnFirework(x, y) {
  const hue = Math.random() * 360;
  for (let i = 0; i < 60; i++) {
    const angle = (i / 60) * Math.PI * 2;
    const speed = 2 + Math.random() * 5;
    fireworks.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      alpha: 1,
      hue: hue + Math.random() * 40 - 20,
      r: 2 + Math.random() * 3,
    });
  }
}

// ── Draw loop ──────────────────────────────────────────────────────────────

function draw() {
  requestAnimationFrame(draw);

  const s = state.speed;

  // Background
  if (state.scene === 'aurora') {
    ctx.fillStyle = '#050810';
    ctx.fillRect(0, 0, W, H);
    drawAurora();
  } else if (state.scene === 'matrix') {
    ctx.fillStyle = 'rgba(0,0,0,.07)';
    ctx.fillRect(0, 0, W, H);
    drawMatrix(s);
  } else {
    ctx.fillStyle = state.bgColor;
    ctx.fillRect(0, 0, W, H);
  }

  if (state.scene === 'particles')  drawParticles(s);
  if (state.scene === 'waves')      drawWaves(s);
  if (state.scene === 'geometric')  drawGeometric(s);
  if (state.scene === 'fireworks')  drawFireworks(s);
  if (state.scene === 'bubbles')    drawBubbles(s);
}

function drawParticles(s) {
  for (const p of particles) {
    p.x += p.vx * s;
    p.y += p.vy * s;
    if (p.x < 0) p.x = W;
    if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H;
    if (p.y > H) p.y = 0;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue},80%,65%,${p.alpha})`;
    ctx.fill();
  }
  // Draw connections
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const d  = Math.sqrt(dx*dx + dy*dy);
      if (d < 120) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(255,255,255,${.12 * (1 - d/120)})`;
        ctx.lineWidth = .5;
        ctx.stroke();
      }
    }
  }
}

function drawMatrix(s) {
  ctx.font = '15px monospace';
  ctx.fillStyle = '#00ff41';
  for (const col of matrix.cols) {
    const char = matrix.chars[Math.floor(Math.random() * matrix.chars.length)];
    ctx.globalAlpha = .85;
    ctx.fillText(char, col.x, col.y);
    ctx.globalAlpha = 1;
    col.y += col.speed * 16 * s;
    if (col.y > H + 20) col.y = -20;
  }
}

function drawAurora() {
  for (const b of auroraBlobs) {
    b.x += b.vx;
    b.y += b.vy;
    b.rot += b.rotSpeed;
    if (b.x < -b.rx) b.vx =  Math.abs(b.vx);
    if (b.x > W+b.rx) b.vx = -Math.abs(b.vx);
    if (b.y < -b.ry) b.vy =  Math.abs(b.vy);
    if (b.y > H+b.ry) b.vy = -Math.abs(b.vy);

    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(b.rot);
    const g = ctx.createRadialGradient(0, 0, 0, 0, 0, Math.max(b.rx, b.ry));
    g.addColorStop(0,   b.color + 'AA');
    g.addColorStop(.5,  b.color + '44');
    g.addColorStop(1,   b.color + '00');
    ctx.fillStyle = g;
    ctx.scale(b.rx / b.ry, 1);
    ctx.beginPath();
    ctx.arc(0, 0, b.ry, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawWaves(s) {
  waveT += .015 * s;
  const count = 6;
  for (let w = 0; w < count; w++) {
    ctx.beginPath();
    const amp  = (40 + w * 20) * state.intensity;
    const freq = .006 - w * .0005;
    const hue  = (w / count) * 280 + 200;
    ctx.moveTo(0, H * .5);
    for (let x = 0; x <= W; x += 4) {
      const y = H * .5
        + Math.sin(x * freq + waveT + w) * amp
        + Math.sin(x * freq * 1.7 + waveT * 1.3 + w * .5) * amp * .5;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    ctx.fillStyle = `hsla(${hue},70%,55%,${.08 + w * .04})`;
    ctx.fill();
  }
}

function drawGeometric(s) {
  for (const sh of shapes) {
    sh.rot += sh.rotSpeed * s;
    ctx.save();
    ctx.translate(sh.x, sh.y);
    ctx.rotate(sh.rot);
    ctx.beginPath();
    for (let i = 0; i <= sh.sides; i++) {
      const a = (i / sh.sides) * Math.PI * 2 - Math.PI / 2;
      i === 0 ? ctx.moveTo(Math.cos(a)*sh.r, Math.sin(a)*sh.r)
              : ctx.lineTo(Math.cos(a)*sh.r, Math.sin(a)*sh.r);
    }
    ctx.closePath();
    if (sh.stroke) {
      ctx.strokeStyle = `hsla(${sh.hue},70%,65%,${sh.alpha * 2})`;
      ctx.lineWidth = 2;
      ctx.stroke();
    } else {
      ctx.fillStyle = `hsla(${sh.hue},60%,55%,${sh.alpha})`;
      ctx.fill();
    }
    ctx.restore();
  }
}

function drawFireworks(s) {
  if (Math.random() < .04 * state.intensity) {
    spawnFirework(Math.random() * W, Math.random() * H * .7);
  }
  for (let i = fireworks.length - 1; i >= 0; i--) {
    const p = fireworks[i];
    p.x += p.vx * s;
    p.y += p.vy * s;
    p.vy += .06 * s;
    p.alpha -= .012 * s;
    if (p.alpha <= 0) { fireworks.splice(i, 1); continue; }
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue},90%,65%,${p.alpha})`;
    ctx.fill();
  }
}

function drawBubbles(s) {
  for (const b of bubbles) {
    b.y -= b.speed * s;
    b.wobble += .03;
    b.x += Math.sin(b.wobble) * .5;
    if (b.y + b.r < 0) {
      b.y = H + b.r;
      b.x = Math.random() * W;
    }
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.strokeStyle = `hsla(${b.hue},60%,70%,.4)`;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Shine
    ctx.beginPath();
    ctx.arc(b.x - b.r*.3, b.y - b.r*.3, b.r*.25, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,.3)`;
    ctx.fill();
  }
}

// ── Flash effect ───────────────────────────────────────────────────────────

function doFlash(color = '#ffffff', duration = 300) {
  const el = document.getElementById('flash');
  el.style.background = color;
  el.style.transition = 'none';
  el.style.opacity = '0.85';
  setTimeout(() => {
    el.style.transition = `opacity ${duration}ms ease`;
    el.style.opacity = '0';
  }, 50);
}

// ── Shake effect ───────────────────────────────────────────────────────────

function doShake(intensity = 10, duration = 500) {
  const el = document.body;
  const start = Date.now();
  const interval = setInterval(() => {
    const t = Date.now() - start;
    if (t > duration) { el.style.transform = ''; clearInterval(interval); return; }
    const decay = 1 - t / duration;
    const x = (Math.random() - .5) * intensity * decay;
    const y = (Math.random() - .5) * intensity * decay;
    el.style.transform = `translate(${x}px, ${y}px)`;
  }, 16);
}

// ── Message overlay ────────────────────────────────────────────────────────

let msgTimer;
function showMessage(text, color = '#ffffff', duration = 3000) {
  const el = document.getElementById('message-text');
  el.textContent = text;
  el.style.color = color;
  el.classList.add('visible');
  clearTimeout(msgTimer);
  msgTimer = setTimeout(() => el.classList.remove('visible'), duration);
}

// ── Party mode ─────────────────────────────────────────────────────────────

let partyInterval;
function partyMode(duration = 6000) {
  const scenes  = ['fireworks','particles','waves','aurora','geometric','bubbles'];
  const colors  = ['#ff006e','#fb5607','#ffbe0b','#8338ec','#3a86ff','#06d6a0'];
  let i = 0;
  clearInterval(partyInterval);
  partyInterval = setInterval(() => {
    applyScene(scenes[i % scenes.length]);
    doFlash(colors[i % colors.length], 200);
    state.speed = 1.5 + Math.random() * 1.5;
    state.intensity = 1.5;
    i++;
  }, duration / 8);
  setTimeout(() => clearInterval(partyInterval), duration);
}

// ── Apply commands ─────────────────────────────────────────────────────────

function applyScene(scene) {
  state.scene = scene;
  initScene();
  document.getElementById('scene-label').textContent = scene;

  // set a sensible bg per scene
  const bgs = {
    particles: '#0f1117', matrix: '#000', waves: '#0a0520',
    aurora: '#050810',    geometric: '#0d0d14', fireworks: '#000814',
    bubbles: '#060d1f',   none: state.bgColor,
  };
  state.bgColor = bgs[scene] ?? '#0f1117';
}

// ─────────────────────────────────────────────────────────────────────────────
// A2A agent
// ─────────────────────────────────────────────────────────────────────────────

const skills = {
  set_scene: ({ scene }) => {
    applyScene(scene);
    return { ok: true, scene };
  },

  set_color: ({ color }) => {
    state.bgColor = color;
    state.accent  = color;
    document.body.style.background = color;
    return { ok: true, color };
  },

  set_theme: ({ theme }) => {
    const themes = {
      dark:   { bg: '#0f1117', accent: '#6c63ff' },
      neon:   { bg: '#05000f', accent: '#ff00ff' },
      sunset: { bg: '#1a0500', accent: '#ff6b35' },
      ocean:  { bg: '#000d1a', accent: '#00d4aa' },
      forest: { bg: '#000d04', accent: '#22c55e' },
    };
    const t = themes[theme] ?? themes.dark;
    state.bgColor = t.bg;
    state.accent  = t.accent;
    return { ok: true, theme };
  },

  flash: ({ color = '#ffffff', duration = 300 } = {}) => {
    doFlash(color, duration);
    return { ok: true };
  },

  shake: ({ intensity = 10, duration = 500 } = {}) => {
    doShake(intensity, duration);
    return { ok: true };
  },

  show_message: ({ text, color = '#ffffff', duration = 3000 } = {}) => {
    showMessage(text, color, duration);
    return { ok: true };
  },

  set_speed: ({ value }) => {
    state.speed = Math.max(0.1, Math.min(5, value));
    return { ok: true, speed: state.speed };
  },

  set_intensity: ({ value }) => {
    state.intensity = Math.max(0.1, Math.min(5, value));
    return { ok: true };
  },

  party: ({ duration = 6000 } = {}) => {
    partyMode(duration);
    showMessage('🎉 PARTY! 🎉', '#ffbe0b', duration - 500);
    return { ok: true };
  },

  reset: () => {
    state = { scene: 'particles', bgColor: '#0f1117', accent: '#6c63ff', speed: 1, intensity: 1 };
    applyScene('particles');
    showMessage('', '#fff', 0);
    return { ok: true };
  },

  ping: ({ message = 'ping' } = {}) => ({ echo: message, ts: Date.now() }),

  agent_card: () => buildAgentCard(),
};

function buildAgentCard() {
  return {
    name: 'Display Agent',
    description: 'Controls visual scenes and effects on the display',
    url: `nkn://${myAddress ?? 'not-connected'}`,
    version: '1.0',
    capabilities: { streaming: false, pushNotifications: false },
    skills: Object.entries(skillsMeta).map(([id, m]) => ({
      id, ...m,
      inputModes: ['application/json'], outputModes: ['application/json'],
    })),
  };
}

const skillsMeta = {
  set_scene:     { name: 'Set Scene',     description: 'Switch animation scene (particles|matrix|waves|aurora|geometric|fireworks|bubbles|none)' },
  set_color:     { name: 'Set Color',     description: 'Set background color (#hex)' },
  set_theme:     { name: 'Set Theme',     description: 'Apply a color theme (dark|neon|sunset|ocean|forest)' },
  flash:         { name: 'Flash',         description: 'Flash the screen a color' },
  shake:         { name: 'Shake',         description: 'Shake the screen' },
  show_message:  { name: 'Show Message',  description: 'Show a text overlay' },
  set_speed:     { name: 'Set Speed',     description: 'Set animation speed (0.1–5)' },
  set_intensity: { name: 'Set Intensity', description: 'Set effect intensity (0.1–5)' },
  party:         { name: 'Party',         description: 'Trigger party mode!' },
  reset:         { name: 'Reset',         description: 'Reset to default state' },
  ping:          { name: 'Ping',          description: 'Echo test' },
};

// NKN client
let myClient = null, myAddress = null;

function initNKN() {
  myClient = new nkn.Client({ seedRpcServerAddr: 'https://mainnet-rpc-node-0001.nkn.org/mainnet/api/wallet' });

  myClient.on('connect', () => {
    myAddress = myClient.addr;
    document.getElementById('dot').className = 'dot connected';
    document.getElementById('address-text').textContent = myAddress;

    // Hide status pill after 8s
    setTimeout(() => document.getElementById('status-pill').classList.add('hide'), 8000);
    document.getElementById('status-pill').addEventListener('mouseenter', () =>
      document.getElementById('status-pill').classList.remove('hide'));
  });

  myClient.on('message', async (msg) => {
    let message;
    try { message = JSON.parse(msg.payload.toString()); } catch { return; }

    const from = msg.src;

    if (message.type === 'task') {
      const task = message.task;
      const skill = skills[task.skill];

      const reply = (state, extra = {}) =>
        myClient.send(from, JSON.stringify({ type: 'task_update', task: { ...task, state, ...extra } }));

      if (!skill) { await reply('failed', { error: `Unknown skill: "${task.skill}"` }); return; }

      await reply('working');
      try {
        const result = await skill(task.params ?? {});
        await reply('completed', { result });
      } catch (err) {
        await reply('failed', { error: err.message });
      }
    }

    if (message.type === 'agent_card_request') {
      myClient.send(from, JSON.stringify({ type: 'agent_card_response', card: buildAgentCard() }));
      // Show a subtle "connected" message
      document.getElementById('status-pill').classList.remove('hide');
      setTimeout(() => document.getElementById('status-pill').classList.add('hide'), 4000);
    }
  });
}

function copyAddress() {
  if (!myAddress) return;
  navigator.clipboard.writeText(myAddress);
  showMessage('Address copied!', '#6c63ff', 1500);
}

// ── Boot ───────────────────────────────────────────────────────────────────
resize();
draw();
applyScene('particles');
initNKN();
</script>
</body>
</html>
