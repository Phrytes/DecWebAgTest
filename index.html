<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Network Explorer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0f1117; --surf:  #1a1d27; --border: #2a2d3a;
      --accent: #6c63ff; --green: #22c55e; --red:    #ef4444; --yellow: #f59e0b;
      --text:   #e2e4ed; --muted: #7a7d8e; --r:      10px;
    }

    body { background:var(--bg); color:var(--text); font-family:system-ui,sans-serif; font-size:14px; min-height:100vh; display:grid; grid-template-rows:56px 1fr; grid-template-columns:300px 1fr; grid-template-areas:"hdr hdr" "side main"; }

    /* Header */
    header { grid-area:hdr; background:var(--surf); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; padding:0 20px; }
    header h1 { font-size:15px; font-weight:600; }
    header h1 span { color:var(--accent); }
    .dot { width:8px; height:8px; border-radius:50%; background:var(--muted); flex-shrink:0; }
    .dot.ready { background:var(--green); box-shadow:0 0 6px var(--green); }
    .dot.warn  { background:var(--yellow); animation:blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }
    #status { font-size:12px; color:var(--muted); }
    .spacer { flex:1; }

    /* Sidebar */
    aside { grid-area:side; background:var(--surf); border-right:1px solid var(--border); overflow-y:auto; display:flex; flex-direction:column; }
    .section { border-bottom:1px solid var(--border); padding:16px; }
    .section-title { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:10px; }

    .addr-box { background:var(--bg); border:1px solid var(--border); border-radius:var(--r); padding:10px 12px; font-family:monospace; font-size:11px; color:#00d4aa; word-break:break-all; cursor:pointer; transition:border-color .2s; }
    .addr-box:hover { border-color:#00d4aa; }
    .addr-box small { display:block; font-family:system-ui; font-size:10px; color:var(--muted); margin-top:3px; }

    input { background:var(--bg); border:1px solid var(--border); border-radius:var(--r); color:var(--text); font-family:inherit; font-size:13px; padding:8px 12px; width:100%; outline:none; transition:border-color .2s; }
    input:focus { border-color:var(--accent); }
    label { display:block; font-size:11px; color:var(--muted); margin-bottom:4px; margin-top:10px; }
    label:first-child { margin-top:0; }

    .btn { border:none; border-radius:var(--r); font-family:inherit; font-size:13px; font-weight:600; cursor:pointer; padding:8px 14px; transition:opacity .15s; width:100%; }
    .btn:hover { opacity:.85; }
    .primary { background:var(--accent); color:#fff; }
    .ghost { background:transparent; border:1px solid var(--border); color:var(--text); }
    .ghost:hover { border-color:var(--accent); color:var(--accent); }
    .sm { padding:5px 10px; font-size:12px; width:auto; }

    .skill-pill { display:inline-block; background:rgba(108,99,255,.15); border:1px solid rgba(108,99,255,.3); color:var(--accent); border-radius:20px; padding:2px 9px; font-size:11px; margin:2px; }

    .agent-item { background:var(--bg); border:1px solid var(--border); border-radius:var(--r); padding:10px 12px; margin-bottom:8px; cursor:pointer; transition:border-color .2s; }
    .agent-item:hover, .agent-item.active { border-color:var(--accent); }
    .agent-item .name { font-weight:600; font-size:13px; margin-bottom:2px; }
    .agent-item .addr { font-family:monospace; font-size:10px; color:var(--muted); word-break:break-all; }

    /* Main */
    main { grid-area:main; display:flex; flex-direction:column; overflow:hidden; }

    .tabs { display:flex; border-bottom:1px solid var(--border); padding:0 20px; background:var(--surf); }
    .tab { padding:14px 16px; font-size:13px; font-weight:500; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; transition:color .2s,border-color .2s; user-select:none; }
    .tab.active { color:var(--accent); border-bottom-color:var(--accent); }
    .tab:hover:not(.active) { color:var(--text); }

    .pane { flex:1; overflow-y:auto; padding:20px; display:none; }
    .pane.active { display:block; }

    /* Task pane */
    .two-col { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
    .panel { background:var(--surf); border:1px solid var(--border); border-radius:var(--r); padding:16px; }
    .panel-title { font-size:13px; font-weight:600; margin-bottom:14px; }

    select { background:var(--bg); border:1px solid var(--border); border-radius:var(--r); color:var(--text); font-family:inherit; font-size:13px; padding:8px 12px; width:100%; outline:none; }
    select:focus { border-color:var(--accent); }
    textarea { background:var(--bg); border:1px solid var(--border); border-radius:var(--r); color:var(--text); font-family:monospace; font-size:12px; padding:8px 12px; width:100%; outline:none; resize:vertical; min-height:80px; transition:border-color .2s; }
    textarea:focus { border-color:var(--accent); }

    .task-item { background:var(--bg); border:1px solid var(--border); border-radius:var(--r); padding:12px; margin-bottom:10px; font-size:12px; }
    .task-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
    .task-skill { font-weight:600; font-size:13px; }
    .badge { border-radius:20px; padding:2px 8px; font-size:11px; font-weight:600; }
    .badge.submitted { background:rgba(245,158,11,.15); color:var(--yellow); }
    .badge.working   { background:rgba(108,99,255,.15); color:var(--accent); }
    .badge.completed { background:rgba(34,197,94,.15);  color:var(--green); }
    .badge.failed    { background:rgba(239,68,68,.15);  color:var(--red); }
    .task-dir  { color:var(--muted); font-size:11px; }
    .task-data { color:var(--muted); font-family:monospace; font-size:11px; word-break:break-all; }
    .task-res  { color:#00d4aa; font-family:monospace; font-size:11px; margin-top:3px; word-break:break-all; }

    /* Log */
    #log { background:var(--bg); border:1px solid var(--border); border-radius:var(--r); padding:12px; min-height:400px; font-family:monospace; font-size:12px; white-space:pre-wrap; }
    .ll { margin-bottom:3px; line-height:1.5; }
    .li { color:#00d4aa; } .lo { color:var(--accent); } .ls { color:var(--muted); } .le { color:var(--red); }

    .empty { text-align:center; color:var(--muted); padding:30px; font-size:13px; }

    #toast { position:fixed; bottom:20px; right:20px; background:var(--surf); border:1px solid var(--border); border-radius:var(--r); padding:10px 16px; font-size:13px; opacity:0; transform:translateY(8px); transition:opacity .2s,transform .2s; pointer-events:none; z-index:100; }
    #toast.show { opacity:1; transform:translateY(0); }
  </style>
</head>
<body>

<header>
  <div class="dot warn" id="dot"></div>
  <h1>Agent Network <span>Explorer</span></h1>
  <span id="status">Starting…</span>
  <div class="spacer"></div>
</header>

<aside>
  <div class="section">
    <div class="section-title">My Agent</div>
    <div class="addr-box" id="my-addr" onclick="copyAddr()" title="Click to copy">
      Connecting…
      <small>Click to copy Peer ID</small>
    </div>
  </div>

  <div class="section">
    <div class="section-title">My Skills</div>
    <div id="my-skills"></div>
  </div>

  <div class="section">
    <div class="section-title">Connect to Agent</div>
    <label>Peer ID</label>
    <input id="peer-input" placeholder="Paste Peer ID…" />
    <label>Label (optional)</label>
    <input id="peer-label" placeholder="e.g. Display Agent" />
    <div style="height:8px"></div>
    <button class="btn primary" onclick="connectToPeer()">Connect &amp; Fetch Card</button>
  </div>

  <div class="section" style="flex:1">
    <div class="section-title">Connected Agents <span id="agent-count" style="color:var(--muted)">(0)</span></div>
    <div id="agent-list"><div class="empty">None yet</div></div>
  </div>
</aside>

<main>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('tasks',this)">Tasks</div>
    <div class="tab" onclick="switchTab('log',this)">Message Log</div>
  </div>

  <div class="pane active" id="pane-tasks">
    <div class="two-col">
      <div class="panel">
        <div class="panel-title">Send Task</div>
        <label>Target Agent</label>
        <select id="task-target"><option value="">— connect an agent first —</option></select>
        <label>Skill ID</label>
        <input id="task-skill" placeholder="e.g. ping, echo" />
        <label>Params (JSON)</label>
        <textarea id="task-params">{ "message": "hello!" }</textarea>
        <div style="height:8px"></div>
        <button class="btn primary" onclick="sendTask()">Send Task →</button>
      </div>
      <div class="panel">
        <div class="panel-title">Task History</div>
        <div id="task-history"><div class="empty">No tasks yet</div></div>
      </div>
    </div>
  </div>

  <div class="pane" id="pane-log">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="font-size:13px;color:var(--muted)">Raw A2A message traffic</span>
      <button class="btn ghost sm" onclick="document.getElementById('log').innerHTML=''">Clear</button>
    </div>
    <div id="log"></div>
  </div>
</main>

<div id="toast"></div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
// ─────────────────────────────────────────────────────────────────────────────
// Local skills
// ─────────────────────────────────────────────────────────────────────────────

const mySkills = {
  ping:      async ({message='ping'}={}) => ({echo:message, ts:Date.now()}),
  echo:      async (params)              => params,
  uppercase: async ({text=''})           => ({result:text.toUpperCase()}),
  agent_card:async ()                    => buildCard(),
};

function buildCard() {
  return { name:'Explorer Agent', description:'General-purpose A2A explorer', url:`peer://${myAddr??'?'}`, version:'1.0', capabilities:{streaming:false,pushNotifications:false}, skills:Object.keys(mySkills).map(id=>({id,inputModes:['application/json'],outputModes:['application/json']})) };
}

// ─────────────────────────────────────────────────────────────────────────────
// PeerJS
// ─────────────────────────────────────────────────────────────────────────────

let peer, myAddr;
const conns   = new Map();  // peerId -> DataConnection
const remotes = new Map();  // peerId -> { label, card }
const pending = new Map();  // taskId -> { resolve, reject, timer, skill }
const taskLog = [];

function start() {
  peer = new Peer({ config:{ iceServers:[
    {urls:'stun:stun.l.google.com:19302'},
    {urls:'stun:stun1.l.google.com:19302'},
  ]}});

  peer.on('open', (id) => {
    myAddr = id;
    document.getElementById('dot').className = 'dot ready';
    document.getElementById('status').textContent = 'Ready';
    document.getElementById('my-addr').childNodes[0].textContent = id;
    renderMySkills();
    slog('sys', `Ready as ${id.slice(0,12)}…`);
  });

  peer.on('connection', (conn) => { wireIncoming(conn); });
  peer.on('error', (e) => { document.getElementById('status').textContent='Error: '+e.type; slog('err',e.type); });
}

function wireIncoming(conn) {
  conn.on('open', () => {
    conns.set(conn.peer, conn);
    if (!remotes.has(conn.peer)) remotes.set(conn.peer, {label: conn.peer.slice(0,12)+'…', card:null});
    setupConnHandlers(conn);
    slog('sys', `Incoming connection from ${conn.peer.slice(0,12)}…`);
  });
}

async function connectToPeer() {
  const id    = document.getElementById('peer-input').value.trim();
  const label = document.getElementById('peer-label').value.trim() || id.slice(0,12)+'…';
  if (!id) { toast('Paste a Peer ID first'); return; }
  if (!peer?.open) { toast('Not ready yet'); return; }

  slog('sys', `Connecting to ${label}…`);
  const conn = peer.connect(id, { reliable:true, serialization:'json' });

  conn.on('open', () => {
    conns.set(id, conn);
    remotes.set(id, { label, card:null });
    setupConnHandlers(conn);
    renderAgentList(); renderTargets();
    slog('sys', `Connected to ${label} — requesting card…`);
    sendTo(id, { type:'agent_card_request' });
    document.getElementById('peer-input').value = '';
    document.getElementById('peer-label').value = '';
  });
  conn.on('error', (e) => { slog('err', e.message); toast('Connection failed'); });
}

function setupConnHandlers(conn) {
  conn.on('data', (raw) => {
    const msg = typeof raw==='string' ? JSON.parse(raw) : raw;
    slog('in', `← ${conn.peer.slice(0,10)}… ${JSON.stringify(msg).slice(0,80)}`);
    handleMessage(conn.peer, msg);
  });
  conn.on('close', () => { conns.delete(conn.peer); slog('sys', `${conn.peer.slice(0,10)}… disconnected`); });
}

function sendTo(peerId, msg) {
  const conn = conns.get(peerId);
  if (!conn?.open) { slog('err','Not connected to '+peerId.slice(0,10)+'…'); return; }
  const raw = JSON.stringify(msg);
  slog('out', `→ ${peerId.slice(0,10)}… ${raw.slice(0,80)}`);
  conn.send(raw);
}

// ─────────────────────────────────────────────────────────────────────────────
// A2A message handling
// ─────────────────────────────────────────────────────────────────────────────

async function handleMessage(from, msg) {
  switch (msg.type) {

    case 'agent_card_request':
      sendTo(from, { type:'agent_card_response', card:buildCard() });
      break;

    case 'agent_card_response':
      remotes.set(from, { ...remotes.get(from), card:msg.card, label:msg.card?.name??remotes.get(from)?.label });
      renderAgentList(); renderTargets();
      toast(`✓ Card: ${msg.card?.name}`);
      break;

    case 'task': {
      const { task } = msg;
      const skill = mySkills[task.skill];
      const reply = (state,extra={}) => sendTo(from, {type:'task_update',task:{...task,state,...extra}});
      if (!skill) { reply('failed',{error:`Unknown skill: "${task.skill}"`}); break; }
      reply('working');
      try   { reply('completed',{result:await skill(task.params??{})}); addTask({...task,direction:'in',from,state:'completed'}); }
      catch (e) { reply('failed',{error:e.message}); }
      break;
    }

    case 'task_update':
      handleTaskUpdate(msg.task);
      break;
  }
}

function sendTask() {
  const peerId = document.getElementById('task-target').value;
  const skill  = document.getElementById('task-skill').value.trim();
  const raw    = document.getElementById('task-params').value.trim();
  if (!peerId) { toast('Select a target agent'); return; }
  if (!skill)  { toast('Enter a skill ID'); return; }
  let params; try { params=JSON.parse(raw||'{}'); } catch { toast('Params must be valid JSON'); return; }

  const id   = crypto.randomUUID();
  const task = { id, skill, params, state:'submitted', direction:'out', to:peerId };
  addTask(task);
  sendTo(peerId, { type:'task', task:{ id, skill, params, state:'submitted' } });

  return new Promise((resolve, reject) => {
    function startTimer() { return setTimeout(()=>{ pending.delete(id); task.state='failed'; task.error='Timeout'; renderTasks(); reject(new Error('timeout')); },30_000); }
    pending.set(id, { resolve, reject, skill, timer:startTimer(), startTimer, taskRef:task });
  }).then(r=>{ toast(`✓ ${skill}`); return r; }).catch(e=>toast(`✗ ${e.message}`));
}

function handleTaskUpdate(task) {
  const p = pending.get(task.id);
  if (!p) return;
  Object.assign(p.taskRef, {state:task.state, result:task.result, error:task.error});
  renderTasks();
  if (task.state==='working') { clearTimeout(p.timer); p.timer=p.startTimer(); }
  else if (task.state==='completed') { clearTimeout(p.timer); pending.delete(task.id); p.resolve(task.result); }
  else if (task.state==='failed')    { clearTimeout(p.timer); pending.delete(task.id); p.reject(new Error(task.error)); }
}

function addTask(task) { taskLog.unshift(task); renderTasks(); }

// ─────────────────────────────────────────────────────────────────────────────
// Rendering
// ─────────────────────────────────────────────────────────────────────────────

function renderMySkills() {
  document.getElementById('my-skills').innerHTML =
    Object.keys(mySkills).map(id=>`<span class="skill-pill">${id}</span>`).join('');
}

function renderAgentList() {
  const el = document.getElementById('agent-list');
  document.getElementById('agent-count').textContent = `(${remotes.size})`;
  if (!remotes.size) { el.innerHTML='<div class="empty">None yet</div>'; return; }
  el.innerHTML='';
  for (const [id, r] of remotes) {
    const d=document.createElement('div'); d.className='agent-item';
    d.innerHTML=`<div class="name">${esc(r.label)}</div><div class="addr">${esc(id)}</div><div style="margin-top:6px">${(r.card?.skills??[]).map(s=>`<span class="skill-pill">${esc(s.id)}</span>`).join('')}</div>`;
    d.onclick=()=>{ document.getElementById('task-target').value=id; switchTab('tasks',document.querySelector('.tab')); };
    el.appendChild(d);
  }
}

function renderTargets() {
  const sel=document.getElementById('task-target');
  sel.innerHTML=remotes.size===0?'<option value="">— connect an agent first —</option>':
    Array.from(remotes.entries()).map(([id,r])=>`<option value="${esc(id)}">${esc(r.label)}</option>`).join('');
}

function renderTasks() {
  const el=document.getElementById('task-history');
  if (!taskLog.length) { el.innerHTML='<div class="empty">No tasks yet</div>'; return; }
  el.innerHTML=taskLog.slice(0,30).map(t=>`
    <div class="task-item">
      <div class="task-head"><span class="task-skill">${esc(t.skill)}</span><span class="badge ${t.state}">${t.state}</span></div>
      <div class="task-dir">${t.direction==='out'?'↑ sent':'↓ received'} · ${esc((t.to||t.from||'').slice(0,14))}…</div>
      <div class="task-data">${esc(JSON.stringify(t.params||{}).slice(0,80))}</div>
      ${t.result?`<div class="task-res">${esc(JSON.stringify(t.result).slice(0,120))}</div>`:''}
    </div>`).join('');
}

// ─────────────────────────────────────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────────────────────────────────────

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('pane-'+name).classList.add('active');
}

function slog(type, text) {
  const el=document.getElementById('log');
  const d=document.createElement('div'); d.className='ll l'+type[0];
  d.textContent=`[${new Date().toLocaleTimeString()}] ${text}`; el.prepend(d);
  while(el.children.length>200) el.removeChild(el.lastChild);
}

let toastT;
function toast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2500); }
function copyAddr() { if(!myAddr)return; navigator.clipboard.writeText(myAddr); toast('Peer ID copied!'); }
function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

start();
</script>
</body>
</html>
